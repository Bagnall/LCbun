<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-label="Cambridge Language Centre banner">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#003057"/>
			<stop offset="0.55" stop-color="#0b3d5c"/>
			<stop offset="1" stop-color="#1b5a4a"/>
		</linearGradient>
		<linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="rgba(244,248,245,0.18)"/>
			<stop offset="1" stop-color="rgba(244,248,245,0)"/>
		</linearGradient>
		<pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
			<path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
		</pattern>
		<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="24"/>
		</filter>
	</defs>

	<rect width="1600" height="640" fill="url(#bg)"/>
	<rect width="1600" height="640" fill="url(#mist)"/>
	<rect width="1600" height="640" fill="url(#grid)"/>

	<g filter="url(#soft)" opacity="0.75">
		<circle cx="260" cy="520" r="220" fill="rgba(139,164,147,0.55)"/>
		<circle cx="520" cy="160" r="170" fill="rgba(115,137,149,0.45)"/>
		<circle cx="1320" cy="360" r="260" fill="rgba(163,193,173,0.35)"/>
		<circle cx="1220" cy="120" r="170" fill="rgba(77,106,120,0.40)"/>
	</g>

	<path d="M0 470 C 240 420, 420 520, 720 480 C 980 446, 1180 360, 1600 430 L1600 640 L0 640 Z"
		fill="rgba(244,248,245,0.08)"/>
</svg>
